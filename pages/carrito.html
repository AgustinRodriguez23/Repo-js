<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TodoTorneos | Carrito</title>
  <link rel="icon" href="/assets/images.png" type="image/x-icon">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">
  <link rel="stylesheet" href="/css/carrito.css">
</head>
<body>

  <header>
    <nav>
      <a href="/index.html" class="brand">TodoTorneos</a>
      <a id="cart" href="#" aria-label="Carrito de premios">
        <img src="/assets/premios.png" alt="">
        <span id="cuenta-premios">0</span>
      </a>
    </nav>
  </header>

  <main>
    <div class="carrito-page">
      <h1>Tu carrito</h1>

      <div id="carrito-vacio">
        <p>No seleccionaste ningún voucher todavía.</p>
        <a href="/index.html">Ver premios disponibles</a>
      </div>

      <section id="productos-container" class="disable"></section>

      <section id="totales" class="disable">
        <p>Total unidades: <span id="unidades">0</span></p>
        <div class="totales-actions">
          <button id="descargar" class="btn-download">⬇ Descargar lista</button>
          <button id="reiniciar" class="btn-reset">Vaciar carrito</button>
        </div>
      </section>
    </div>
  </main>

  <footer class="footer">
    <a href="/index.html" class="brand">TodoTorneos</a>
    <div class="footer-links">
      <a href="/index.html">Inicio</a>
      <a href="#">Carrito</a>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js" integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q" crossorigin="anonymous"></script>
  <script src="/js/vouchers.js"></script>
  <script src="/js/carrito.js"></script>
</body>
</html>
